<div class="page-wrapper">
  <!-- MENU SIDEBAR-->
	<aside class="menu-sidebar d-none d-lg-block">
			<div class="logo">
				<a routerLink="/products">
					<img src="assets/images/logo.png" alt="shopping" class="img-responsive">
				</a>
			</div>
			<div class="menu-sidebar-content js-scrollbar1">
				<nav class="navbar-sidebar">
					<ul class="list-unstyled navbar-list">
						<li>
							<a routerLink="/products" routerLinkActive="active-link">Books</a>
						</li>
						<li>
							<a routerLink="/products" routerLinkActive="active-link">Coffee Mugs</a>
						</li>
						<li>
							<a routerLink="/products" routerLinkActive="active-link">Mouse Pads</a>
						</li>
						<li>
							<a routerLink="/products" routerLinkActive="active-link">Luggage Tags</a>
						</li>
						<li class="demo-nav-item">
							<a routerLink="/demo" routerLinkActive="active-link">
								<i class="fas fa-flask"></i> Demo &amp; Test
							</a>
						</li>
					</ul>
				</nav>
			</div>
	</aside>
		<!-- END MENU SIDEBAR-->

		<!-- PAGE CONTAINER-->
		<div class="page-container">
			<!-- HEADER DESKTOP-->
			<header class="header-desktop">
				<div class="section-content section-content-p30">
					<div class="container-fluid">
						<div class="header-wrap">
							<form class="form-header" onsubmit="return false;" method="GET">
								<input class="au-input au-input-xl" type="text" name="search"
									placeholder="Search for data ..." />
								<button class="au-btn-submit" type="submit">
									Search
								</button>
							</form>

							<!-- Dynamic Cart Badge (bound to CartService) -->
							<div class="cart-area d-n">
								<a routerLink="/cart" class="cart-link">
									<div class="total">
										{{ totalPrice$ | async | currency:'USD' }}
										<span class="cart-badge">
											{{ totalQuantity$ | async }}
										</span>
									</div>
									<i class="fas fa-shopping-cart" aria-hidden="true"></i>
								</a>
							</div>

						</div>
						<div class="account-wrap"></div>
					</div>
				</div>
			</header>
			<!-- END HEADER DESKTOP-->

			<!-- MAIN CONTENT (Router Outlet) -->
			<router-outlet></router-outlet>
			<!-- END MAIN CONTENT-->

  </div>
    <!-- END PAGE CONTAINER-->
</div>

	<footer>
		<ul>
			<li><a href="#">About Us</a></li>
			<li><a href="#">Contact Us</a></li>
			<li><a href="#">Help</a></li>
		</ul>
	</footer>
